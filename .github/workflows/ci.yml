name: Phonix Test Automation Workflow

on: 
  push: 
    branches: ["master"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "17 10 * * *"
    
  workflow_dispatch:
    inputs:
      env:
        description: "Enviroment"
        type: choice
        options: [qa,uat,dev,live]
        default: qa
        required: true
      suiteXmlFile:
       description: "suiteXmlFile"
       type: choice
       options: ['testng.xml', 'Regression.xml', 'testng-datadriven.xml']
       required: true

permissions:
  contents: write 

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.3.1

      - name: Setup Java JDK
        uses: actions/setup-java@v5.0.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Creating the .env file
        run: |
              echo "DB_URL=${{ secrets.DB_URL }}" >> .env
              echo "DB_USER_NAME=${{ secrets.DB_USER_NAME }}" >> .env
              echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
              
      - name: Defult value for Execution
        id: default
        run: |
              echo "suiteXmlFile=${{ github.event.inputs.suiteXmlFile || 'testng.xml'}}" >> $GITHUB_OUTPUT
              echo "env=${{ github.event.inputs.env || 'qa' }}" >> $GITHUB_OUTPUT

      - name: Execute Test Automation Framework
        run: mvn test -DsuiteXmlFiles="${{ steps.default.outputs.suiteXmlFile}}" -Denv="${{ steps.default.outputs.env}}"

      - name: Execute Test Automation Framework
        if: always()
        run: mvn allure:report

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          publish_branch: gh-pages
          force_orphan: true

      - name: Upload SureFire Report Artifact
        if: always()
        uses: actions/upload-artifact@v5.0.0
        with:
          name: SureFire Report
          path: target/surefire-reports/
          retention-days: 10
